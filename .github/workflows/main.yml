name: Build Standalone Release APK

on:
  workflow_dispatch: # הפעלה ידנית בלבד מתוך לשונית Actions בגיטהאב

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # טוען גם תת-פרויקטים חיצוניים כמו futopay

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Standalone Release APK
      run: ./gradlew assembleStandaloneRelease

    - name: Upload Standalone Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Standalone-Release-APK
        path: app/build/outputs/apk/standalone/release/*.apk
